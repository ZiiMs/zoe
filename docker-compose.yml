services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: zoe
      POSTGRES_USER: zoe
      POSTGRES_PASSWORD: zoe
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zoe -d zoe"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
